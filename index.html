<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="max-age=60, must-revalidate">
<title>釣魚派對</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { touch-action: manipulation; }
body {
  overflow: hidden;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  background: #000;
}
canvas {
  display: block;
  touch-action: manipulation;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(() => {
'use strict';

// --- Canvas Setup ---
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H, dpr;
let WATER_Y; // y-coordinate of water surface
let knobY; // y-coordinate of cast knobs (set in resize)
let layoutReady = false;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  WATER_Y = H * 0.28;

  knobY = H - 50;

  // Relayout players and fish (guard: skip on initial call before vars are defined)
  if (layoutReady) {
    for (const p of players) {
      const spacing = W / (players.length + 1);
      p.boatX = spacing * (p.index + 1);
      p.boatY = WATER_Y - 5;
      p.maxHookLength = (H - WATER_Y) * MAX_HOOK_LENGTH_RATIO;
      if (p.hookLength > p.maxHookLength) p.hookLength = p.maxHookLength;
    }
    const relayoutFish = (list, minYOffset) => {
      for (const f of list) {
        f.y = clamp(f.y, WATER_Y + minYOffset, H - 30);
      }
    };
    relayoutFish(fishes, 25);
    relayoutFish(menuFishes, 30);
  }
}
resize();
window.addEventListener('resize', resize);

// --- Version ---
const VERSION = 'v1.2.3';

// --- Constants ---
const HOOK_STATES = { IDLE: 0, DROP: 1, CATCH: 2, RETRACT: 3, CHARGE: 4 };
const CHARGE_DURATION = 1.5; // seconds to reach full charge
const MIN_CHARGE = 0.15;     // minimum charge ratio (so even a tap casts a bit)
const GAME_DURATION = 60;
const HOOKS_PER_ROUND = [10, 12, 15]; // round 1, 2, 3
const HOOK_DROP_SPEED = 4.5;
const HOOK_RETRACT_SPEED = 6;
const HOOK_CATCH_RETRACT_SPEED = 5;
const MAX_HOOK_LENGTH_RATIO = 0.85; // fraction of underwater depth
const SWING_SPEED = 1.8; // radians per second
const SWING_RANGE = Math.PI / 3; // 60 degrees
const KNOB_RADIUS = 30;

const PLAYER_COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12'];
const PLAYER_NAMES = ['玩家1', '玩家2', '玩家3', '玩家4'];

const FISH_TYPES = [
  { name: 'copper',  points: 5,   w: 25, h: 12, speed: 1.5, weight: 30, color: '#b87333', finColor: '#8B5A2B', escapeChance: 0.05 },
  { name: 'gray',    points: 10,  w: 30, h: 15, speed: 2.0, weight: 25, color: '#95a5a6', finColor: '#7f8c8d', escapeChance: 0.10 },
  { name: 'blue',    points: 20,  w: 35, h: 17, speed: 2.5, weight: 20, color: '#5dade2', finColor: '#2e86c1', escapeChance: 0.15 },
  { name: 'green',   points: 50,  w: 45, h: 22, speed: 2.0, weight: 12, color: '#58d68d', finColor: '#28b463', escapeChance: 0.25 },
  { name: 'red',     points: 70,  w: 55, h: 26, speed: 1.5, weight: 7,  color: '#e74c3c', finColor: '#c0392b', escapeChance: 0.35 },
  { name: 'golden',  points: 100, w: 40, h: 20, speed: 3.5, weight: 4,  color: '#f1c40f', finColor: '#f39c12', escapeChance: 0.50 },
  { name: 'rainbow', points: 150, w: 45, h: 22, speed: 4.0, weight: 2,  color: '#ff69b4', finColor: '#ff1493', escapeChance: 0.60 },
];

// --- Game State ---
let screen = 'menu'; // 'menu', 'play', 'roundresult', 'tournamentover', 'eliminated'
let playerCount = 0;
let players = [];
let fishes = [];
let bubbles = [];
let scoreTexts = [];
let timer = GAME_DURATION;
let lastTime = 0;
let menuFishes = [];
let clouds = [];
let menuSlots = ['human', 'ai', 'ai', 'ai']; // each slot: 'human' | 'ai'
layoutReady = true;

// --- Tournament State ---
let tournamentRound = 0;
let tournamentBracket = [];
let advancedPlayers = [];
let roundResults = [];
let roundResultReady = false;
let roundResultTimer = 0;
let tournamentHistory = [];

// --- Utility ---
function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function cycleSlot(i) {
  menuSlots[i] = menuSlots[i] === 'human' ? 'ai' : 'human';
}

// --- Cloud ---
function createCloud() {
  return {
    x: rand(-100, W + 100),
    y: rand(10, WATER_Y * 0.5),
    w: rand(80, 180),
    h: rand(30, 50),
    speed: rand(0.15, 0.4),
  };
}

function initClouds() {
  clouds = [];
  for (let i = 0; i < 6; i++) clouds.push(createCloud());
}

function drawCloud(c) {
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath();
  ctx.ellipse(c.x, c.y, c.w * 0.5, c.h * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(c.x - c.w * 0.25, c.y + 5, c.w * 0.35, c.h * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(c.x + c.w * 0.25, c.y + 3, c.w * 0.3, c.h * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();
}

function updateClouds(dt) {
  for (const c of clouds) {
    c.x += c.speed * 60 * dt;
    if (c.x - c.w > W + 50) { c.x = -c.w - 50; c.y = rand(10, WATER_Y * 0.5); }
  }
}

// --- Background ---
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, WATER_Y);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(1, '#b8e4f9');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, WATER_Y);
}

function drawWater(time) {
  // Water gradient
  const grad = ctx.createLinearGradient(0, WATER_Y, 0, H);
  grad.addColorStop(0, '#1a7bb5');
  grad.addColorStop(0.5, '#145f8a');
  grad.addColorStop(1, '#0d3b5e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, WATER_Y, W, H - WATER_Y);

  // Animated wave surface
  ctx.beginPath();
  ctx.moveTo(0, WATER_Y);
  for (let x = 0; x <= W; x += 4) {
    const y = WATER_Y + Math.sin(x * 0.02 + time * 2) * 4 + Math.sin(x * 0.01 + time * 1.5) * 3;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, WATER_Y - 10);
  ctx.lineTo(0, WATER_Y - 10);
  ctx.closePath();
  ctx.fillStyle = '#1a7bb5';
  ctx.fill();

  // Wave highlight
  ctx.beginPath();
  for (let x = 0; x <= W; x += 4) {
    const y = WATER_Y + Math.sin(x * 0.02 + time * 2) * 4 + Math.sin(x * 0.01 + time * 1.5) * 3;
    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function drawBackground(time) {
  drawSky();
  for (const c of clouds) drawCloud(c);
  drawWater(time);
}

// --- Fish ---
function pickFishType() {
  const r = Math.random() * 100;
  let sum = 0;
  for (const ft of FISH_TYPES) {
    sum += ft.weight;
    if (r <= sum) return ft;
  }
  return FISH_TYPES[0];
}

function createFish(forMenu) {
  const type = pickFishType();
  const fromLeft = Math.random() < 0.5;
  const minY = forMenu ? WATER_Y + 30 : WATER_Y + 25;
  const maxY = forMenu ? H - 30 : H - 30;
  return {
    type,
    x: fromLeft ? -type.w : W + type.w,
    y: rand(minY, maxY),
    dir: fromLeft ? 1 : -1,
    speed: type.speed * rand(0.8, 1.2),
    bobPhase: rand(0, Math.PI * 2),
    bobAmp: rand(2, 6),
    alive: true,
    caught: false,
    escaping: false,
    escapeTimer: 0,
  };
}

function drawFish(f, time) {
  const { type, x, dir } = f;
  const bobY = f.y + Math.sin(time * 2 + f.bobPhase) * f.bobAmp;
  const hw = type.w / 2;
  const hh = type.h / 2;

  ctx.save();
  ctx.translate(x, bobY);
  ctx.scale(dir, 1);

  if (f.escaping) {
    // Frantic wiggle
    ctx.translate(0, Math.sin(time * 30) * 4);
    // Speed stretch
    ctx.scale(1.3, 0.85);
    // Flash effect
    ctx.globalAlpha = 0.5 + 0.5 * Math.abs(Math.sin(time * 15));
  }

  // Compute body/fin colors (rainbow cycles, others use type defaults)
  let bodyColor = type.color;
  let finColor = type.finColor;
  if (type.name === 'rainbow') {
    const hue = (time * 60 + f.bobPhase * 30) % 360;
    bodyColor = `hsl(${hue}, 80%, 55%)`;
    finColor = `hsl(${(hue + 30) % 360}, 80%, 45%)`;
    ctx.shadowColor = bodyColor;
    ctx.shadowBlur = 15;
  } else if (type.name === 'golden') {
    ctx.shadowColor = '#f1c40f';
    ctx.shadowBlur = 12;
  }

  // Body
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(0, 0, hw, hh, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body gradient overlay
  const bodyGrad = ctx.createLinearGradient(0, -hh, 0, hh);
  bodyGrad.addColorStop(0, 'rgba(255,255,255,0.3)');
  bodyGrad.addColorStop(1, 'rgba(0,0,0,0.15)');
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  ctx.shadowBlur = 0;

  // Tail
  ctx.fillStyle = finColor;
  ctx.beginPath();
  ctx.moveTo(-hw + 2, 0);
  ctx.lineTo(-hw - hh * 0.8, -hh * 0.7);
  ctx.lineTo(-hw - hh * 0.8, hh * 0.7);
  ctx.closePath();
  ctx.fill();

  // Dorsal fin
  ctx.fillStyle = finColor;
  ctx.beginPath();
  ctx.moveTo(hw * 0.1, -hh);
  ctx.lineTo(-hw * 0.2, -hh - hh * 0.4);
  ctx.lineTo(-hw * 0.4, -hh + 2);
  ctx.closePath();
  ctx.fill();

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(hw * 0.45, -hh * 0.2, hh * 0.25, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(hw * 0.5, -hh * 0.2, hh * 0.13, 0, Math.PI * 2);
  ctx.fill();

  if (f.escaping) ctx.globalAlpha = 1;
  ctx.restore();
}

function updateFish(f, dt) {
  if (f.caught) return;
  if (f.escaping) {
    f.escapeTimer -= dt;
    const speedMult = 3 + 2 * Math.max(0, f.escapeTimer / 0.8);
    f.x += f.dir * f.speed * speedMult * 60 * dt;
    // Spawn trail bubbles behind escaping fish
    if (Math.random() < 0.4) {
      spawnBubbles(f.x - f.dir * f.type.w / 2, f.y, 1);
    }
    if (f.escapeTimer <= 0) f.escaping = false;
  } else {
    f.x += f.dir * f.speed * 60 * dt;
  }
}

function isFishOffscreen(f) {
  return (f.dir === 1 && f.x > W + f.type.w + 20) ||
         (f.dir === -1 && f.x < -f.type.w - 20);
}

function getFishBounds(f, time) {
  const bobY = f.y + Math.sin(time * 2 + f.bobPhase) * f.bobAmp;
  return {
    x: f.x - f.type.w / 2,
    y: bobY - f.type.h / 2,
    w: f.type.w,
    h: f.type.h,
  };
}

// --- Color Utility ---
function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
  const ar = ah >> 16, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
  const br = bh >> 16, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
  const r = Math.round(ar + (br - ar) * t);
  const g = Math.round(ag + (bg - ag) * t);
  const b2 = Math.round(ab + (bb - ab) * t);
  return `rgb(${r},${g},${b2})`;
}

// --- Charge Effect ---
function drawChargeEffect(p, time) {
  if (p.hookState !== HOOK_STATES.CHARGE) return;

  // Expanding rings from knob (visible around finger)
  for (const ring of p.chargeRings) {
    const chargeColor = lerpColor('#3498db', '#f1c40f', p.chargeLevel);
    ctx.strokeStyle = chargeColor;
    ctx.globalAlpha = ring.opacity;
    ctx.lineWidth = 2 + p.chargeLevel * 2;
    ctx.beginPath();
    ctx.arc(p.boatX, knobY, ring.radius, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Charge percentage text above card
  const cCardW = Math.min(100, W / (players.length + 1) * 0.85);
  const cCardH = cCardW * 1.6;
  const cCardTop = WATER_Y + 8 - cCardH;
  const pct = Math.floor(p.chargeLevel * 100);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(pct + '%', p.boatX, cCardTop - 25);
}

// --- Rank Computation ---
function computeRanks() {
  const sorted = [...players].sort((a, b) => b.score - a.score);
  const rankMap = new Map();
  let currentRank = 1;
  for (let i = 0; i < sorted.length; i++) {
    if (i > 0 && sorted[i].score < sorted[i - 1].score) currentRank = i + 1;
    rankMap.set(sorted[i].index, currentRank);
  }
  return rankMap;
}

// --- Player Card & Hook ---
function createPlayer(index, total) {
  const spacing = W / (total + 1);
  const bx = spacing * (index + 1);
  return {
    index,
    boatX: bx,
    boatY: WATER_Y - 5,
    score: 0,
    hookState: HOOK_STATES.IDLE,
    hookAngle: 0,
    swingDir: 1,
    hookLength: 0,
    maxHookLength: (H - WATER_Y) * MAX_HOOK_LENGTH_RATIO,
    hookDropAngle: 0,
    caughtFish: null,
    color: PLAYER_COLORS[index],
    name: PLAYER_NAMES[index],
    glowPhase: rand(0, Math.PI * 2),
    isAI: false,
    aiWaitTimer: 0,
    chargeLevel: 0,
    chargeRings: [],
    effectiveMaxHookLength: 0,
    pointerId: -1,
    chargeStartY: 0,
    lastPointerY: -1,
    eliminated: false,
    hooksLeft: 0,
  };
}

function drawPlayerCard(p, time, rank) {
  const cardW = Math.min(100, W / (players.length + 1) * 0.85);
  const cardH = cardW * 1.6;
  const cornerR = 10;
  const centerX = p.boatX;
  const bobOffset = Math.sin(time * 1.5 + p.glowPhase) * 2;
  const cardBottom = WATER_Y + 8 + bobOffset;
  const cardTop = cardBottom - cardH;
  const cardLeft = centerX - cardW / 2;

  ctx.save();

  // Card base color: gray if eliminated, red if rank 3-4, green=human, blue=AI
  const cardBaseColor = p.eliminated ? '#555' : rank >= 3 ? '#c0392b' : (p.isAI ? '#2980b9' : '#27ae60');

  // --- Hanging wire + clip ---
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(centerX, cardTop - 18);
  ctx.lineTo(centerX, cardTop);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(centerX, cardTop - 20, 3, 0, Math.PI * 2);
  ctx.fill();
  // Tab at top of card
  ctx.fillStyle = cardBaseColor;
  ctx.beginPath();
  ctx.roundRect(centerX - 10, cardTop - 6, 20, 10, [4, 4, 0, 0]);
  ctx.fill();

  // --- Card shadow ---
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.roundRect(cardLeft + 2, cardTop + 2, cardW, cardH, cornerR);
  ctx.fill();

  // --- Card body gradient ---
  const cardGrad = ctx.createLinearGradient(cardLeft, cardTop, cardLeft, cardBottom);
  cardGrad.addColorStop(0, cardBaseColor);
  cardGrad.addColorStop(1, lerpColor(cardBaseColor, '#000000', 0.3));
  ctx.fillStyle = cardGrad;
  ctx.beginPath();
  ctx.roundRect(cardLeft, cardTop, cardW, cardH, cornerR);
  ctx.fill();

  // --- Glossy highlight (top 40%) ---
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.roundRect(cardLeft, cardTop, cardW, cardH * 0.4, [cornerR, cornerR, 0, 0]);
  ctx.fill();

  // --- Card border ---
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(cardLeft, cardTop, cardW, cardH, cornerR);
  ctx.stroke();

  // --- Crown for 1st place ---
  if (rank === 1) {
    const crownSize = Math.max(14, cardW * 0.2);
    ctx.font = crownSize + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('👑', centerX, cardTop + cardH * 0.08);
  }

  // --- Avatar circle ---
  const avatarR = cardW * 0.22;
  const avatarY = cardTop + cardH * 0.3;
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(centerX, avatarY, avatarR + 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.arc(centerX, avatarY, avatarR, 0, Math.PI * 2);
  ctx.fill();
  const emojiSize = Math.max(12, avatarR * 1.2);
  ctx.font = emojiSize + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(p.isAI ? '🤖' : '🧑', centerX, avatarY);

  // --- Rank badge (ribbon shape) ---
  const badgeW = cardW * 0.7;
  const badgeH = 18;
  const badgeY = cardTop + cardH * 0.52;
  const badgeLeft = centerX - badgeW / 2;
  const rankColors = ['#f1c40f', '#bdc3c7', '#cd7f32', '#95a5a6'];
  const rankBg = rankColors[rank - 1] || '#95a5a6';

  // Left ribbon tail
  ctx.fillStyle = rankBg;
  ctx.beginPath();
  ctx.moveTo(badgeLeft - 6, badgeY);
  ctx.lineTo(badgeLeft, badgeY);
  ctx.lineTo(badgeLeft, badgeY + badgeH);
  ctx.lineTo(badgeLeft - 6, badgeY + badgeH);
  ctx.lineTo(badgeLeft - 2, badgeY + badgeH / 2);
  ctx.closePath();
  ctx.fill();
  // Center badge
  ctx.beginPath();
  ctx.roundRect(badgeLeft, badgeY, badgeW, badgeH, 3);
  ctx.fill();
  // Right ribbon tail
  ctx.beginPath();
  ctx.moveTo(badgeLeft + badgeW + 6, badgeY);
  ctx.lineTo(badgeLeft + badgeW, badgeY);
  ctx.lineTo(badgeLeft + badgeW, badgeY + badgeH);
  ctx.lineTo(badgeLeft + badgeW + 6, badgeY + badgeH);
  ctx.lineTo(badgeLeft + badgeW + 2, badgeY + badgeH / 2);
  ctx.closePath();
  ctx.fill();
  // Ribbon highlight
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.roundRect(badgeLeft, badgeY, badgeW, badgeH / 2, [3, 3, 0, 0]);
  ctx.fill();
  // Rank text
  ctx.fillStyle = rank === 1 ? '#5d4200' : '#fff';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('NO.' + rank, centerX, badgeY + badgeH / 2);

  // --- Score (large, prominent) ---
  const scoreSize = Math.max(18, cardW * 0.3);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + scoreSize + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(p.score, centerX, cardTop + cardH * 0.75);

  // --- Player name + hooks ---
  const nameSize = Math.max(9, cardW * 0.13);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = nameSize + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const hookInfo = p.eliminated ? p.name : p.name + ' 🪝' + p.hooksLeft;
  ctx.fillText(hookInfo, centerX, cardTop + cardH * 0.9);

  ctx.restore();

  // --- IDLE glow around card ---
  if (p.hookState === HOOK_STATES.IDLE) {
    const glow = 0.2 + 0.2 * Math.sin(time * 3 + p.glowPhase);
    ctx.strokeStyle = `rgba(255,255,255,${glow})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(cardLeft - 4, cardTop - 4, cardW + 8, cardH + 8, cornerR + 2);
    ctx.stroke();
  }
}

function getHookTip(p) {
  const angle = (p.hookState === HOOK_STATES.IDLE || p.hookState === HOOK_STATES.CHARGE) ? p.hookAngle : p.hookDropAngle;
  const startX = p.boatX;
  const startY = p.boatY + 5;
  const tipX = startX + Math.sin(angle) * p.hookLength;
  const tipY = startY + Math.cos(angle) * p.hookLength;
  return { x: tipX, y: tipY, startX, startY, angle };
}

function drawHookLine(p, time) {
  if (p.eliminated) return;
  if (p.hookState === HOOK_STATES.IDLE || p.hookState === HOOK_STATES.CHARGE) {
    // Dashed indicator line
    const angle = p.hookAngle;
    const len = 50;
    const sx = p.boatX;
    const sy = p.boatY + 5;
    const ex = sx + Math.sin(angle) * len;
    const ey = sy + Math.cos(angle) * len;
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(ex, ey);
    ctx.stroke();
    ctx.setLineDash([]);
    return;
  }

  const tip = getHookTip(p);

  // Fishing line
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(tip.startX, tip.startY);
  ctx.lineTo(tip.x, tip.y);
  ctx.stroke();

  // Hook
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(tip.x, tip.y + 5, 5, -Math.PI * 0.3, Math.PI * 1.2);
  ctx.stroke();

  // Draw caught fish at hook tip
  if (p.hookState === HOOK_STATES.CATCH && p.caughtFish) {
    const cf = p.caughtFish;
    const saved = { x: cf.x, y: cf.y };
    cf.x = tip.x;
    cf.y = tip.y + 10;
    drawFish(cf, time);
    cf.x = saved.x;
    cf.y = saved.y;
  }
}

function tryHookFish(p, time) {
  const tip = getHookTip(p);
  for (const f of fishes) {
    if (!f.alive || f.caught) continue;
    const b = getFishBounds(f, time);
    if (tip.x >= b.x && tip.x <= b.x + b.w && tip.y >= b.y && tip.y <= b.y + b.h) {
      f.caught = true;
      f.alive = false;
      p.caughtFish = f;
      p.hookState = HOOK_STATES.CATCH;
      p.catchStartLength = p.hookLength;
      p.escapeAt = Math.random() < f.type.escapeChance
        ? p.hookLength * rand(0.3, 0.7)
        : -1;
      spawnBubbles(tip.x, tip.y, 6);
      return true;
    }
  }
  return false;
}

function updatePlayer(p, dt, time) {
  if (p.eliminated) return;
  switch (p.hookState) {
    case HOOK_STATES.CHARGE:
      // Swing continues while charging
      p.hookAngle += p.swingDir * SWING_SPEED * dt;
      if (p.hookAngle > SWING_RANGE) { p.hookAngle = SWING_RANGE; p.swingDir = -1; }
      if (p.hookAngle < -SWING_RANGE) { p.hookAngle = -SWING_RANGE; p.swingDir = 1; }
      p.hookLength = 0;
      // chargeLevel is set by pointermove (drag up to reduce)
      // Spawn expanding rings periodically
      if (Math.random() < 0.3 || p.chargeRings.length === 0) {
        p.chargeRings.push({ radius: 20, opacity: 0.8 });
      }
      // Update rings: expand outward and fade
      for (let i = p.chargeRings.length - 1; i >= 0; i--) {
        const r = p.chargeRings[i];
        r.radius += 80 * dt;
        r.opacity -= 1.2 * dt;
        if (r.opacity <= 0) p.chargeRings.splice(i, 1);
      }
      break;

    case HOOK_STATES.IDLE:
      p.hookAngle += p.swingDir * SWING_SPEED * dt;
      if (p.hookAngle > SWING_RANGE) { p.hookAngle = SWING_RANGE; p.swingDir = -1; }
      if (p.hookAngle < -SWING_RANGE) { p.hookAngle = -SWING_RANGE; p.swingDir = 1; }
      p.hookLength = 0;
      if (p.isAI) {
        if (p.hooksLeft <= 0) break; // no hooks left
        p.aiWaitTimer -= dt;
        if (p.aiWaitTimer <= 0) {
          p.hookDropAngle = p.hookAngle;
          const aiCharge = rand(0.4, 1.0);
          p.effectiveMaxHookLength = aiCharge * p.maxHookLength;
          p.hookState = HOOK_STATES.DROP;
          p.hookLength = 0;
          p.hooksLeft--;
          spawnBubbles(p.boatX, p.boatY + 15, 3);
        }
      }
      break;

    case HOOK_STATES.DROP:
      p.hookLength += HOOK_DROP_SPEED * 60 * dt;
      tryHookFish(p, time);
      if (p.hookState === HOOK_STATES.CATCH) break;
      if (p.hookLength >= (p.effectiveMaxHookLength || p.maxHookLength)) {
        p.hookState = HOOK_STATES.RETRACT;
      }
      break;

    case HOOK_STATES.CATCH:
      // Check if fish escapes
      if (p.escapeAt > 0 && p.hookLength <= p.escapeAt) {
        const tip = getHookTip(p);
        const f = p.caughtFish;
        f.alive = true;
        f.caught = false;
        f.x = tip.x;
        f.y = tip.y;
        f.escaping = true;
        f.escapeTimer = 0.8;
        f.dir = (Math.random() < 0.5) ? 1 : -1;
        spawnBubbles(tip.x, tip.y, 8);
        p.caughtFish = null;
        p.hookState = HOOK_STATES.RETRACT;
        break;
      }
      p.hookLength -= HOOK_CATCH_RETRACT_SPEED * 60 * dt;
      if (p.hookLength <= 0) {
        p.hookLength = 0;
        p.hookState = HOOK_STATES.IDLE;
        if (p.isAI) p.aiWaitTimer = rand(1.5, 4.0);
        // Award score
        if (p.caughtFish) {
          const pts = p.caughtFish.type.points;
          const fishTypeName = p.caughtFish.type.name;
          const fishColor = p.caughtFish.type.color;
          p.score += pts;
          const stCardW = Math.min(100, W / (players.length + 1) * 0.85);
          const stCardH = stCardW * 1.6;
          spawnScoreText(p.boatX, WATER_Y + 8 - stCardH * 0.25, pts, fishColor, fishTypeName);
          spawnBubbles(p.boatX, p.boatY + 10, 4);
          p.caughtFish = null;
        }
      }
      break;

    case HOOK_STATES.RETRACT:
      tryHookFish(p, time);
      if (p.hookState === HOOK_STATES.CATCH) break;
      p.hookLength -= HOOK_RETRACT_SPEED * 60 * dt;
      if (p.hookLength <= 0) {
        p.hookLength = 0;
        p.hookState = HOOK_STATES.IDLE;
        if (p.isAI) p.aiWaitTimer = rand(1.5, 4.0);
      }
      break;
  }
}

// --- Bubbles ---
function spawnBubbles(x, y, count) {
  for (let i = 0; i < count; i++) {
    bubbles.push({
      x: x + rand(-15, 15),
      y: y + rand(-5, 5),
      r: rand(2, 5),
      vy: -rand(0.8, 2),
      vx: rand(-0.5, 0.5),
      life: 1,
      decay: rand(0.5, 1.2),
    });
  }
}

function updateBubbles(dt) {
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.x += b.vx * 60 * dt;
    b.y += b.vy * 60 * dt;
    b.life -= b.decay * dt;
    if (b.life <= 0) bubbles.splice(i, 1);
  }
}

function drawBubbles() {
  for (const b of bubbles) {
    ctx.globalAlpha = b.life * 0.6;
    ctx.fillStyle = 'rgba(200,230,255,0.7)';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// --- Score Texts ---
function spawnScoreText(x, y, pts, color, fishType) {
  scoreTexts.push({ x, y, text: '+' + pts, color, fishType: fishType || '', life: 1, vy: -1.5 });
}

function updateScoreTexts(dt) {
  for (let i = scoreTexts.length - 1; i >= 0; i--) {
    const s = scoreTexts[i];
    s.y += s.vy * 60 * dt;
    s.life -= 0.7 * dt;
    if (s.life <= 0) scoreTexts.splice(i, 1);
  }
}

const RAINBOW_SCORE_COLORS = ['#e74c3c', '#f1c40f', '#2ecc71', '#3498db'];

function drawScoreTexts() {
  for (const s of scoreTexts) {
    ctx.globalAlpha = s.life;
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    if (s.fishType === 'rainbow') {
      // Draw each character in a different color
      const chars = s.text.split('');
      const totalW = ctx.measureText(s.text).width;
      let cx = s.x - totalW / 2;
      ctx.textAlign = 'left';
      for (let i = 0; i < chars.length; i++) {
        ctx.fillStyle = RAINBOW_SCORE_COLORS[i % RAINBOW_SCORE_COLORS.length];
        ctx.fillText(chars[i], cx, s.y);
        cx += ctx.measureText(chars[i]).width;
      }
    } else {
      ctx.fillStyle = s.color;
      ctx.fillText(s.text, s.x, s.y);
    }
  }
  ctx.globalAlpha = 1;
}

// --- HUD ---
function drawHUD() {
  const timerY = 10;
  const sec = Math.max(0, Math.ceil(timer));
  const timerColor = timer <= 10 ? '#e74c3c' : '#fff';
  const roundLabel = tournamentRound === 3 ? '決賽' : '第' + tournamentRound + '場';
  const pillW = 160;

  // Background pill
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(W / 2 - pillW / 2, timerY, pillW, 30, 8);
  ctx.fill();

  // Round label (left side)
  ctx.fillStyle = '#f1c40f';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(roundLabel, W / 2 - pillW / 2 + 12, timerY + 13);

  // Timer text (right side)
  ctx.fillStyle = timerColor;
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(sec + '秒', W / 2 + pillW / 2 - 12, timerY + 13);

  // Progress bar
  const barW = pillW - 20;
  const barH = 4;
  const barX = W / 2 - barW / 2;
  const barY = timerY + 27;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW, barH, 2);
  ctx.fill();
  const progress = Math.max(0, timer / GAME_DURATION);
  ctx.fillStyle = timer <= 10 ? '#e74c3c' : '#2ecc71';
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW * progress, barH, 2);
  ctx.fill();

  ctx.textBaseline = 'alphabetic';
  drawVersion();
}

function drawVersion() {
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText(VERSION, W - 8, 8);
  ctx.textBaseline = 'alphabetic';
}

// --- Menu Screen ---
function initMenu() {
  screen = 'menu';
  menuFishes = [];
  for (let i = 0; i < 10; i++) menuFishes.push(createFish(true));
  initClouds();
  tournamentRound = 0;
  tournamentBracket = [];
  advancedPlayers = [];
  roundResults = [];
  tournamentHistory = [];
}

function getMenuLayout() {
  const useGrid = W > H; // 2x2 grid in landscape
  const availH = H - WATER_Y;
  const titleSize = useGrid ? Math.min(28, availH * 0.2) : 42;
  const titleGap = useGrid ? Math.min(10, availH * 0.06) : 40;
  const btnW = useGrid ? Math.min(150, W * 0.18) : 180;
  const btnH = useGrid ? Math.min(38, (availH - titleSize - titleGap - 20) / 2.5) : 50;
  const gapX = useGrid ? 12 : 0;
  const gapY = useGrid ? Math.min(8, btnH * 0.2) : 15;
  const titleY = useGrid ? WATER_Y + titleSize + 5 : H * 0.42 - 40;
  const startY = titleY + titleGap;
  const lastRowY = useGrid ? startY + (btnH + gapY) : startY + 3 * (btnH + gapY);
  const startBtnY = lastRowY + btnH + gapY * 2;
  return { useGrid, btnW, btnH, gapX, gapY, startY, titleY, titleSize, startBtnY };
}

function getMenuButtonRect(i, layout) {
  const { useGrid, btnW, btnH, gapX, gapY, startY } = layout;
  if (useGrid) {
    const col = i % 2;
    const row = Math.floor(i / 2);
    const gridW = 2 * btnW + gapX;
    const bx = W / 2 - gridW / 2 + col * (btnW + gapX);
    const by = startY + row * (btnH + gapY);
    return { x: bx, y: by, w: btnW, h: btnH };
  }
  return { x: W / 2 - btnW / 2, y: startY + i * (btnH + gapY), w: btnW, h: btnH };
}

function getStartButtonRect(layout) {
  const w = layout.useGrid ? (2 * layout.btnW + layout.gapX) : layout.btnW;
  return { x: W / 2 - w / 2, y: layout.startBtnY, w, h: layout.btnH };
}

function drawMenuButtons() {
  const layout = getMenuLayout();
  const { titleY, titleSize } = layout;

  // Title
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + titleSize + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 8;
  ctx.fillText('🎣 釣魚錦標賽', W / 2, titleY);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = Math.max(12, titleSize * 0.38) + 'px sans-serif';
  ctx.fillText('三場淘汰賽 · 每場前2名晉級', W / 2, titleY + titleSize * 0.5);

  const fontSize = Math.min(20, layout.btnH * 0.45);
  for (let i = 0; i < 4; i++) {
    const r = getMenuButtonRect(i, layout);
    const state = menuSlots[i];

    // Button bg — always player color (no off state)
    ctx.fillStyle = PLAYER_COLORS[i];
    ctx.beginPath();
    ctx.roundRect(r.x, r.y, r.w, r.h, 12);
    ctx.fill();
    // Button highlight
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.roundRect(r.x, r.y, r.w, r.h / 2, [12, 12, 0, 0]);
    ctx.fill();
    // Button text with emoji
    const emoji = state === 'human' ? ' 🧑' : ' 🤖';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + fontSize + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('P' + (i + 1) + emoji, r.x + r.w / 2, r.y + r.h / 2);
  }

  // Start button
  const sr = getStartButtonRect(layout);
  ctx.fillStyle = '#27ae60';
  ctx.beginPath();
  ctx.roundRect(sr.x, sr.y, sr.w, sr.h, 12);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.roundRect(sr.x, sr.y, sr.w, sr.h / 2, [12, 12, 0, 0]);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + fontSize + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('開始錦標賽!', sr.x + sr.w / 2, sr.y + sr.h / 2);

  ctx.textBaseline = 'alphabetic';
}

// --- Knobs ---
function drawKnobs() {
  for (const p of players) {
    if (p.isAI || p.eliminated) continue;
    const cx = p.boatX;
    const cy = knobY;
    const isActive = p.hookState === HOOK_STATES.IDLE || p.hookState === HOOK_STATES.CHARGE;
    const isCharging = p.hookState === HOOK_STATES.CHARGE;

    ctx.save();

    // Dimmed when hook is out
    if (!isActive) ctx.globalAlpha = 0.35;

    // Filled circle background
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(cx, cy, KNOB_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    // Highlight gradient
    const grad = ctx.createRadialGradient(cx, cy - KNOB_RADIUS * 0.3, 0, cx, cy, KNOB_RADIUS);
    grad.addColorStop(0, 'rgba(255,255,255,0.35)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, KNOB_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    // Charge progress arc
    if (isCharging) {
      const chargeColor = lerpColor('#3498db', '#f1c40f', p.chargeLevel);
      ctx.strokeStyle = chargeColor;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(cx, cy, KNOB_RADIUS + 4, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * p.chargeLevel);
      ctx.stroke();
    }

    // Border
    ctx.strokeStyle = isCharging ? '#fff' : 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, KNOB_RADIUS, 0, Math.PI * 2);
    ctx.stroke();

    // Player label inside knob
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('P' + (p.index + 1), cx, cy);

    ctx.restore();
  }
}

// --- Play Screen ---
function startTournamentRound(roundNum) {
  tournamentRound = roundNum;

  if (roundNum === 1) {
    tournamentBracket = menuSlots.map((state, i) => ({
      name: state === 'ai' ? '電腦' + (i + 1) : PLAYER_NAMES[i],
      color: PLAYER_COLORS[i],
      isAI: state === 'ai',
      isHuman: state === 'human',
    }));
  } else {
    const usedColors = new Set(advancedPlayers.map(p => p.color));
    const availColors = PLAYER_COLORS.filter(c => !usedColors.has(c));
    const aiNames = roundNum === 2 ? ['挑戰者A', '挑戰者B'] : ['決賽者A', '決賽者B'];
    const newAIs = [0, 1].map(i => ({
      name: aiNames[i],
      color: availColors[i] || PLAYER_COLORS[(i + 2) % 4],
      isAI: true,
      isHuman: false,
    }));
    tournamentBracket = [...advancedPlayers, ...newAIs];
  }

  playerCount = 4;
  players = [];
  for (let i = 0; i < 4; i++) {
    const entry = tournamentBracket[i];
    const p = createPlayer(i, 4);
    p.isAI = entry.isAI;
    p.color = entry.color;
    p.name = entry.name;
    p.score = 0;
    p.hooksLeft = HOOKS_PER_ROUND[roundNum - 1] || 10;
    if (p.isAI) p.aiWaitTimer = rand(1.0, 3.0);
    players.push(p);
  }
  fishes = [];
  bubbles = [];
  scoreTexts = [];
  timer = GAME_DURATION;
  for (let i = 0; i < 8 + playerCount * 2; i++) fishes.push(createFish(false));
  screen = 'play';
}

function endTournamentRound() {
  const sorted = [...players].sort((a, b) => b.score - a.score);
  roundResults = sorted;

  // Save round history
  tournamentHistory.push({
    round: tournamentRound,
    results: sorted.map(p => ({ name: p.name, color: p.color, score: p.score, isAI: p.isAI })),
  });

  // Top 2 advance
  advancedPlayers = sorted.slice(0, 2).map(p => ({
    name: p.name,
    color: p.color,
    isAI: p.isAI,
    isHuman: !p.isAI,
  }));

  const humansAdvanced = advancedPlayers.some(p => p.isHuman);

  if (tournamentRound >= 3) {
    screen = 'tournamentover';
  } else if (!humansAdvanced) {
    screen = 'eliminated';
  } else {
    screen = 'roundresult';
    roundResultReady = false;
    roundResultTimer = 2.0;
  }
}

function eliminatePlayer(p) {
  p.eliminated = true;
  // Retract hook if active
  if (p.hookState === HOOK_STATES.DROP || p.hookState === HOOK_STATES.CATCH || p.hookState === HOOK_STATES.RETRACT) {
    if (p.caughtFish) { p.caughtFish.alive = false; p.caughtFish = null; }
    p.hookLength = 0;
  }
  p.hookState = HOOK_STATES.IDLE;
}

function updatePlay(dt, time) {
  timer -= dt;
  if (timer <= 0) {
    timer = 0;
    endTournamentRound();
    return;
  }

  // Mid-round elimination: at 30s mark, eliminate 4th place
  const elapsed = GAME_DURATION - timer;
  const eliminatedCount = players.filter(p => p.eliminated).length;
  if (eliminatedCount === 0 && elapsed >= 30) {
    const sorted = [...players].sort((a, b) => b.score - a.score);
    eliminatePlayer(sorted[3]); // 4th place
  }

  // Early round end: all non-eliminated players out of hooks and idle
  const activePlayers = players.filter(p => !p.eliminated);
  const allOutOfHooks = activePlayers.every(p => p.hooksLeft <= 0 && p.hookState === HOOK_STATES.IDLE);
  if (allOutOfHooks) {
    timer = 0;
    endTournamentRound();
    return;
  }

  updateClouds(dt);

  // Update players
  for (const p of players) updatePlayer(p, dt, time);

  // Update fish
  const targetFish = 8 + playerCount * 2;
  for (let i = fishes.length - 1; i >= 0; i--) {
    const f = fishes[i];
    if (f.caught) { fishes.splice(i, 1); continue; }
    updateFish(f, dt);
    if (isFishOffscreen(f)) { fishes.splice(i, 1); }
  }
  // Respawn
  while (fishes.length < targetFish) fishes.push(createFish(false));

  updateBubbles(dt);
  updateScoreTexts(dt);
}

function drawPlay(time) {
  drawBackground(time);

  // Draw fish
  for (const f of fishes) {
    if (f.alive && !f.caught) drawFish(f, time);
  }

  // Draw hook lines (behind cards)
  for (const p of players) drawHookLine(p, time);

  // Draw player cards and charge effects
  const rankMap = computeRanks();
  for (const p of players) {
    drawPlayerCard(p, time, rankMap.get(p.index));
    drawChargeEffect(p, time);
  }

  drawKnobs();
  drawBubbles();
  drawScoreTexts();
  drawHUD();
}

// --- Game Over ---
// --- Tournament Result Screens ---

function drawResultScoreboard(sorted, cx, startY, showAdvance) {
  const rowH = 50;
  const boardW = Math.min(280, W - 40);
  const boardX = cx - boardW / 2;

  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(boardX - 10, startY - 10, boardW + 20, sorted.length * rowH + 20, 12);
  ctx.fill();

  for (let i = 0; i < sorted.length; i++) {
    const p = sorted[i];
    const ry = startY + i * rowH;
    const advanced = i < 2;

    // Rank prefix
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText((i === 0) ? '👑 ' : (i + 1) + '. ', boardX + 5, ry + 30);

    // Color dot
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(boardX + 50, ry + 25, 8, 0, Math.PI * 2);
    ctx.fill();

    // Name
    ctx.fillStyle = '#fff';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(p.name, boardX + 65, ry + 30);

    // Score
    ctx.fillStyle = '#f1c40f';
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(p.score + '分', boardX + boardW - (showAdvance ? 50 : 5), ry + 30);

    // Advance/Eliminate badge
    if (showAdvance) {
      ctx.fillStyle = advanced ? '#27ae60' : '#e74c3c';
      ctx.beginPath();
      ctx.roundRect(boardX + boardW - 45, ry + 14, 45, 22, 4);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(advanced ? '晉級' : '淘汰', boardX + boardW - 22, ry + 25);
      ctx.textBaseline = 'alphabetic';
    }
  }

  return startY + sorted.length * rowH + 20;
}

function updateRoundResult(dt) {
  if (!roundResultReady) {
    roundResultTimer -= dt;
    if (roundResultTimer <= 0) roundResultReady = true;
  }
}

function drawRoundResult(time) {
  drawPlay(time);
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;
  const roundLabel = tournamentRound === 3 ? '決賽' : '第' + tournamentRound + '場';

  ctx.fillStyle = '#f1c40f';
  ctx.font = 'bold 36px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(roundLabel + ' 結束！', cx, H * 0.18);

  const bottomY = drawResultScoreboard(roundResults, cx, H * 0.25, true);

  // Tap prompt
  if (roundResultReady) {
    const alpha = 0.5 + 0.5 * Math.sin(time * 3);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#fff';
    ctx.font = '18px sans-serif';
    ctx.textAlign = 'center';
    const nextLabel = (tournamentRound + 1) === 3 ? '決賽' : '第' + (tournamentRound + 1) + '場';
    ctx.fillText('點擊進入' + nextLabel, cx, bottomY + 30);
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('結算中...', cx, bottomY + 30);
  }
}

function drawTournamentOver(time) {
  drawPlay(time);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;
  let cy = H * 0.1;

  // Champion display
  const champion = roundResults[0];
  ctx.fillStyle = '#f1c40f';
  ctx.font = 'bold 42px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🏆 錦標賽結束！', cx, cy);
  cy += 45;

  // Champion card
  ctx.fillStyle = champion.color;
  ctx.beginPath();
  ctx.roundRect(cx - 70, cy, 140, 50, 10);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('👑 ' + champion.name, cx, cy + 25);
  ctx.textBaseline = 'alphabetic';
  cy += 65;

  // Show all 3 rounds summary
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('── 各場成績 ──', cx, cy);
  cy += 20;

  for (const hist of tournamentHistory) {
    const rLabel = hist.round === 3 ? '決賽' : '第' + hist.round + '場';
    ctx.fillStyle = '#f1c40f';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(rLabel, cx, cy);
    cy += 16;
    for (let i = 0; i < hist.results.length; i++) {
      const r = hist.results[i];
      const advanced = i < 2;
      ctx.fillStyle = r.color;
      ctx.beginPath();
      ctx.arc(cx - 60, cy - 4, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = advanced ? '#fff' : 'rgba(255,255,255,0.4)';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(r.name, cx - 50, cy);
      ctx.textAlign = 'right';
      ctx.fillText(r.score + '分', cx + 70, cy);
      cy += 16;
    }
    cy += 6;
  }

  // Prompt
  const alpha = 0.5 + 0.5 * Math.sin(time * 3);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#fff';
  ctx.font = '18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('點擊回到主選單', cx, Math.min(cy + 20, H - 30));
  ctx.globalAlpha = 1;
}

function drawEliminated(time) {
  drawPlay(time);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;

  ctx.fillStyle = '#e74c3c';
  ctx.font = 'bold 38px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('已淘汰！', cx, H * 0.25);

  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '18px sans-serif';
  ctx.fillText('所有玩家在第' + tournamentRound + '場被淘汰', cx, H * 0.33);

  drawResultScoreboard(roundResults, cx, H * 0.4, true);

  const alpha = 0.5 + 0.5 * Math.sin(time * 3);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#fff';
  ctx.font = '18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('點擊回到主選單', cx, H * 0.85);
  ctx.globalAlpha = 1;
}

// --- iOS Safari: prevent double-tap zoom, scroll, and pinch zoom ---
document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });
document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', (e) => e.preventDefault(), { passive: false });
document.addEventListener('gestureend', (e) => e.preventDefault(), { passive: false });

// --- Input ---
canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  if (screen === 'menu') {
    // Check slot buttons
    const layout = getMenuLayout();
    for (let i = 0; i < 4; i++) {
      const r = getMenuButtonRect(i, layout);
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
        cycleSlot(i);
        return;
      }
    }
    // Check start button
    const sr = getStartButtonRect(layout);
    if (x >= sr.x && x <= sr.x + sr.w && y >= sr.y && y <= sr.y + sr.h) {
      startTournamentRound(1);
    }
  } else if (screen === 'play') {
    // Find closest knob within touch range (human only)
    let closest = null;
    let closestDist = KNOB_RADIUS + 15; // extra padding for touch
    for (const p of players) {
      if (p.isAI || p.eliminated) continue;
      const dx = x - p.boatX;
      const dy = y - knobY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < closestDist) {
        closest = p;
        closestDist = dist;
      }
    }
    if (closest && closest.hookState === HOOK_STATES.IDLE && closest.hooksLeft > 0) {
      // Instant cast at max power (charge mode preserved but disabled)
      closest.effectiveMaxHookLength = closest.maxHookLength;
      closest.hookDropAngle = closest.hookAngle;
      closest.hookState = HOOK_STATES.DROP;
      closest.hookLength = 0;
      closest.hooksLeft--;
      spawnBubbles(closest.boatX, closest.boatY + 15, 8);
    }
  } else if (screen === 'roundresult') {
    if (roundResultReady) startTournamentRound(tournamentRound + 1);
  } else if (screen === 'tournamentover' || screen === 'eliminated') {
    initMenu();
  }
});

function releaseCharge(pointerId) {
  if (screen !== 'play') return;
  for (const p of players) {
    if (p.isAI || p.hookState !== HOOK_STATES.CHARGE) continue;
    if (p.pointerId !== pointerId) continue;
    // Quick tap (no pointermove fired) → max power
    const level = (p.lastPointerY === -1) ? 1 : Math.max(MIN_CHARGE, p.chargeLevel);
    p.effectiveMaxHookLength = level * p.maxHookLength;
    p.hookDropAngle = p.hookAngle;
    p.hookState = HOOK_STATES.DROP;
    p.hookLength = 0;
    p.hooksLeft--;
    p.pointerId = -1;
    spawnBubbles(p.boatX, p.boatY + 15, 3 + Math.floor(level * 5));
  }
}

const DRAG_RANGE = 150; // pixels of upward drag for 0% → 100% adjustment

canvas.addEventListener('pointermove', (e) => {
  if (screen !== 'play') return;
  const rect = canvas.getBoundingClientRect();
  const y = e.clientY - rect.top;
  for (const p of players) {
    if (p.isAI || p.hookState !== HOOK_STATES.CHARGE) continue;
    if (p.pointerId !== e.pointerId) continue;
    // Drag up from start → increase charge (start=MIN_CHARGE, drag up full range=1)
    const dragUp = Math.max(0, p.chargeStartY - y);
    p.chargeLevel = Math.min(1, MIN_CHARGE + dragUp / DRAG_RANGE);
    p.lastPointerY = y;
  }
});

canvas.addEventListener('pointerup', (e) => { releaseCharge(e.pointerId); });
canvas.addEventListener('pointercancel', (e) => { releaseCharge(e.pointerId); });
canvas.addEventListener('pointerleave', (e) => { releaseCharge(e.pointerId); });

// --- Main Loop ---
let globalTime = 0;

function frame(ts) {
  const tsSeconds = ts / 1000;
  const dt = Math.min(lastTime ? tsSeconds - lastTime : 1 / 60, 1 / 30);
  lastTime = tsSeconds;
  globalTime += dt;

  ctx.clearRect(0, 0, W, H);

  if (screen === 'menu') {
    updateClouds(dt);
    // Update menu fish
    for (let i = menuFishes.length - 1; i >= 0; i--) {
      updateFish(menuFishes[i], dt);
      if (isFishOffscreen(menuFishes[i])) {
        menuFishes.splice(i, 1);
        menuFishes.push(createFish(true));
      }
    }
    drawBackground(globalTime);
    for (const f of menuFishes) drawFish(f, globalTime);
    drawMenuButtons();
    drawVersion();
  } else if (screen === 'play') {
    updatePlay(dt, globalTime);
    drawPlay(globalTime);
  } else if (screen === 'roundresult') {
    updateRoundResult(dt);
    drawRoundResult(globalTime);
  } else if (screen === 'tournamentover') {
    drawTournamentOver(globalTime);
  } else if (screen === 'eliminated') {
    drawEliminated(globalTime);
  }

  requestAnimationFrame(frame);
}

// Polyfill roundRect if needed
if (!ctx.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (!Array.isArray(r)) r = [r, r, r, r];
    while (r.length < 4) r.push(r[r.length - 1] || 0);
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.arcTo(x + w, y, x + w, y + r[1], r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.arcTo(x + w, y + h, x + w - r[2], y + h, r[2]);
    this.lineTo(x + r[3], y + h);
    this.arcTo(x, y + h, x, y + h - r[3], r[3]);
    this.lineTo(x, y + r[0]);
    this.arcTo(x, y, x + r[0], y, r[0]);
    this.closePath();
  };
}

initMenu();
requestAnimationFrame(frame);

})();
</script>
